[build]
  command = "bun install --frozen-lockfile || bun install && bun run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"

[[redirects]]
  force = true
  from = "/sitemap.xml"
  status = 200
  to = "/.netlify/functions/sitemap"

[[redirects]]
  force = true
  from = "/sitemap-static.xml"
  status = 200
  to = "/.netlify/functions/sitemap"

[[redirects]]
  force = true
  from = "/sitemap-hikes.xml"
  status = 200
  to = "/.netlify/functions/sitemap"

[[redirects]]
  force = true
  from = "/sitemap-equipment.xml"
  status = 200
  to = "/.netlify/functions/sitemap"

[[redirects]]
  force = true
  from = "/sitemap-blog.xml"
  status = 200
  to = "/.netlify/functions/sitemap"

[[redirects]]
  force = true
  from = "/robots.txt"
  status = 200
  to = "/.netlify/functions/sitemap"

[[redirects]]
  force = true
  from = "/llms.txt"
  status = 200
  to = "/.netlify/functions/sitemap"

[[redirects]]
  force = true
  from = "/llms-full.txt"
  status = 200
  to = "/.netlify/functions/sitemap"

[[redirects]]
  from = "/*"
  status = 200
  to = "/index.html"

[[redirects]]
  from = "/.well-known/*"
  status = 200
  to = "/public/.well-known/:splat"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-site"
    X-DNS-Prefetch-Control = "off"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://esm.sh https://*.supabase.co https://umami-badradventures.zocomputer.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://api.stripe.com https://api.resend.com https://api.telegram.org https://umami-badradventures.zocomputer.io; frame-src https://js.stripe.com https://hooks.stripe.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self' https://hooks.stripe.com; upgrade-insecure-requests;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"


# Trigger clean rebuild
